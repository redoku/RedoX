<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лог запуска</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d10; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas', monospace; font-size: 12px; display: flex; flex-direction: column; height: 100vh; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .toolbar-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
    .toolbar-actions { display: flex; gap: 6px; }
    .toolbar-actions button {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); border-radius: 6px; padding: 5px 12px;
      cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.2s;
    }
    .toolbar-actions button:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .toolbar-actions button.accent { border-color: #a06cd5; color: #a06cd5; }
    .toolbar-actions button.accent:hover { background: rgba(160,108,213,0.15); color: #c9a0ff; }

    .log-content {
      flex: 1; overflow-y: auto; padding: 10px 14px; white-space: pre-wrap;
      word-break: break-all; line-height: 1.6; user-select: text; cursor: text;
    }
    .log-content::-webkit-scrollbar { width: 6px; }
    .log-content::-webkit-scrollbar-track { background: transparent; }
    .log-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    .log-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    .status-bar {
      padding: 4px 12px; border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Лог запуска</span>
    <div class="toolbar-actions">
      <button id="btn-copy" class="accent">Копировать</button>
      <button id="btn-clear">Очистить</button>
    </div>
  </div>
  <div class="log-content" id="log"></div>
  <div class="status-bar" id="status">0 строк</div>

  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    let lines = [];

    function render() {
      logEl.textContent = lines.join('\n');
      statusEl.textContent = lines.length + ' строк';
      logEl.scrollTop = logEl.scrollHeight;
    }

    window.api.onLogHistory((history) => {
      lines = history.slice();
      render();
    });

    window.api.onLogLine((line) => {
      lines.push(line);
      if (lines.length > 2000) lines.shift();
      render();
    });

    window.api.onLogClear(() => {
      lines = [];
      render();
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      if (!lines.length) return;
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = document.getElementById('btn-copy');
        btn.textContent = 'Скопировано!';
        setTimeout(() => btn.textContent = 'Копировать', 1500);
      });
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      lines = [];
      render();
    });
  </script>
</body>
</html>
